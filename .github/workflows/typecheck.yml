name: Typecheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API server
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm exec tsc -p artifacts/api-server/tsconfig.json --noEmit 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-server-typecheck-log
          path: typecheck.log
          if-no-files-found: error
