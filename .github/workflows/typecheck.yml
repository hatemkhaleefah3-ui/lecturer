name: Typecheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: lecturer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d lecturer"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Render build
        shell: bash
        run: pnpm run build 2>&1 | tee build.log

      - name: Smoke test production start
        shell: bash
        env:
          PORT: "4173"
          DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/lecturer"
        run: |
          pnpm start > start.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/api/healthz > health.json; then
              curl --fail --silent http://127.0.0.1:4173/ > index.html
              grep -qi '<!doctype html' index.html
              curl --fail --silent http://127.0.0.1:4173/jobs/test-job > spa.html
              grep -qi '<!doctype html' spa.html
              table_count=$(PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d lecturer -tAc "SELECT count(*) FROM information_schema.tables WHERE table_name='lecturer_jobs'")
              test "$table_count" = "1"
              cat health.json
              exit 0
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat start.log
              exit 1
            fi
            sleep 1
          done
          cat start.log
          exit 1

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-build-log
          path: |
            build.log
            start.log
            health.json
            index.html
            spa.html
          if-no-files-found: ignore
