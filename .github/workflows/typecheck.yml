name: Typecheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Render build
        id: build
        shell: bash
        run: |
          set +e
          pnpm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Smoke test production start
        shell: bash
        env:
          PORT: "4173"
        run: |
          pnpm start > start.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/api/healthz > health.json; then
              cat health.json
              exit 0
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat start.log
              exit 1
            fi
            sleep 1
          done
          cat start.log
          exit 1

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-build-log
          path: |
            build.log
            start.log
            health.json
          if-no-files-found: ignore
