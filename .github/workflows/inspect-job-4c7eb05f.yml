name: Inspect reported job 4c7eb05f

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch job status
        run: |
          set -euo pipefail
          curl --fail-with-body -sS \
            https://lecturer.onrender.com/api/lecturer/jobs/4c7eb05f-07db-4a83-a50a-b9be185f6ec2 \
            | tee job.json
          python3 -m json.tool job.json
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reported-job-status-4c7eb05f
          path: job.json
          if-no-files-found: ignore
