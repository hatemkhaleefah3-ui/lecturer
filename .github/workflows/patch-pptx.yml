name: Apply PPTX compatibility patch
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]' || startsWith(github.event.head_commit.message, 'chore: apply PPTX')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove unsupported language properties
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('artifacts/api-server/src/lib/lecturer/pptx-generator.ts')
          s=p.read_text()
          s=s.replace('  pptx.lang = "en-US";\n', '')
          s=s.replace('    lang: "en-US",\n', '')
          p.write_text(s)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add artifacts/api-server/src/lib/lecturer/pptx-generator.ts
          git commit -m 'fix: remove unsupported PPTX language properties'
          git push origin HEAD:main
