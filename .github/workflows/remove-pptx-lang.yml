name: Apply PPTX metadata compatibility fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/remove-pptx-lang.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Remove unsupported PPTX language metadata
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('artifacts/api-server/src/lib/lecturer/pptx-generator.ts')
          text = path.read_text()
          text = text.replace('  pptx.lang = "en-US";\n', '')
          text = text.replace('    lang: "en-US",\n', '')
          path.write_text(text)
          PY
      - name: Commit fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add artifacts/api-server/src/lib/lecturer/pptx-generator.ts
          git diff --cached --quiet && exit 0
          git commit -m "fix: remove unsupported PPTX language metadata"
          git push
